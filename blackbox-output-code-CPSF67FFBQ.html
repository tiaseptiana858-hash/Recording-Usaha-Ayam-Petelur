<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recording Ayam Petelur</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 5px solid #4facfe;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        input, select, textarea {
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        .kondisi-telur {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .kondisi-item {
            text-align: center;
            padding: 15px;
            background: white;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .kondisi-item:hover {
            border-color: #4facfe;
            transform: translateY(-2px);
        }

        .kondisi-item.selected {
            border-color: #4facfe;
            background: #4facfe;
            color: white;
        }

        .btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3);
        }

        .data-section {
            margin-top: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 1.1em;
            opacity: 0.9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e1e5e9;
        }

        th {
            background: #4facfe;
            color: white;
            font-weight: 600;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .delete-btn:hover {
            background: #ff5252;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .kondisi-telur {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐔 Recording Ayam Petelur</h1>
            <p>Sistem Monitoring Produksi Harian</p>
        </div>

        <div class="content">
            <!-- Form Input Data -->
            <div class="form-section">
                <h2 style="margin-bottom: 20px; color: #333;">📝 Input Data Harian</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="kodeKandang">Kode Kandang *</label>
                        <input type="text" id="kodeKandang" placeholder="Contoh: KANDANG-A01" required>
                    </div>
                    <div class="form-group">
                        <label for="tanggal">Tanggal *</label>
                        <input type="date" id="tanggal" required>
                    </div>
                    <div class="form-group">
                        <label for="jumlahTelur">Jumlah Produksi Telur *</label>
                        <input type="number" id="jumlahTelur" placeholder="0" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="pakan">Jumlah Pakan (kg) *</label>
                        <input type="number" id="pakan" placeholder="0" min="0" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="ayamMati">Jumlah Ayam Mati *</label>
                        <input type="number" id="ayamMati" placeholder="0" min="0" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Kondisi Fisik Telur *</label>
                    <div class="kondisi-telur">
                        <div class="kondisi-item" data-value="BAGUS">
                            <div style="font-size: 2em;">✅</div>
                            <div>BAGUS</div>
                        </div>
                        <div class="kondisi-item" data-value="RETak">
                            <div style="font-size: 2em;">🔨</div>
                            <div>RETak</div>
                        </div>
                        <div class="kondisi-item" data-value="KOTOR">
                            <div style="font-size: 2em;">🧽</div>
                            <div>KOTOR</div>
                        </div>
                    </div>
                </div>
                
                <button class="btn" onclick="simpanData()">💾 Simpan Data</button>
            </div>

            <!-- Statistik -->
            <div class="data-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="totalRecords">0</div>
                        <div class="stat-label">Total Record</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalTelur">0</div>
                        <div class="stat-label">Total Telur</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalMati">0</div>
                        <div class="stat-label">Total Mati</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalPakan">0</div>
                        <div class="stat-label">Total Pakan (kg)</div>
                    </div>
                </div>

                <!-- Tabel Data -->
                <h2 style="margin-bottom: 20px; color: #333;">📊 Riwayat Data</h2>
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>Kode Kandang</th>
                            <th>Tanggal</th>
                            <th>Telur</th>
                            <th>Kondisi</th>
                            <th>Pakan (kg)</th>
                            <th>Ayam Mati</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let dataRecords = JSON.parse(localStorage.getItem('ayamPetelurData')) || [];
        let selectedKondisi = '';

        // Inisialisasi
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('tanggal').value = today;
            updateStats();
            renderTable();
            setupKondisiTelur();
        });

        // Setup kondisi telur
        function setupKondisiTelur() {
            document.querySelectorAll('.kondisi-item').forEach(item => {
                item.addEventListener('click', function() {
                    document.querySelectorAll('.kondisi-item').forEach(i => i.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedKondisi = this.dataset.value;
                });
            });
        }

        // Simpan data
        function simpanData() {
            const kodeKandang = document.getElementById('kodeKandang').value.trim();
            const tanggal = document.getElementById('tanggal').value;
            const jumlahTelur = parseInt(document.getElementById('jumlahTelur').value);
            const pakan = parseFloat(document.getElementById('pakan').value);
            const ayamMati = parseInt(document.getElementById('ayamMati').value);

            if (!kodeKandang || !tanggal || !jumlahTelur || !pakan || !selectedKondisi || ayamMati < 0) {
                alert('⚠️ Mohon lengkapi semua data dengan benar!');
                return;
            }

            const newRecord = {
                id: Date.now(),
                kodeKandang,
                tanggal,
                jumlahTelur,
                kondisi: selectedKondisi,
                pakan,
                ayamMati,
                timestamp: new Date().toLocaleString('id-ID')
            };

            dataRecords.unshift(newRecord);
            localStorage.setItem('ayamPetelurData', JSON.stringify(dataRecords));

            // Reset form
            document.getElementById('kodeKandang').value = '';
            document.getElementById('jumlahTelur').value = '';
            document.getElementById('pakan').value = '';
            document.getElementById('ayamMati').value = '';
            document.querySelectorAll('.kondisi-item').forEach(i => i.classList.remove('selected'));
            selectedKondisi = '';

            updateStats();
            renderTable();
            alert('✅ Data berhasil disimpan!');
        }

        // Update statistik
        function updateStats() {
            const totalRecords = dataRecords.length;
            const totalTelur = dataRecords.reduce((sum, record) => sum + record.jumlahTelur, 0);
            const totalMati = dataRecords.reduce((sum, record) => sum + record.ayamMati, 0);
            const totalPakan = dataRecords.reduce((sum, record) => sum + record.pakan, 0);

            document.getElementById('totalRecords').textContent = totalRecords;
            document.getElementById('totalTelur').textContent = totalTelur.toLocaleString();
            document.getElementById('totalMati').textContent = totalMati;
            document.getElementById('totalPakan').textContent = totalPakan.toFixed(1);
        }

        // Render tabel
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            dataRecords.forEach(record => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td><strong>${record.kodeKandang}</strong></td>
                    <td>${new Date(record.tanggal).toLocaleDateString('id-ID')}</td>
                    <td>${record.jumlahTelur.toLocaleString()}</td>
                    <td>
                        <span style="padding: 5px 10px; background: ${getKondisiColor(record.kondisi)}; 
                                     color: white; border-radius: 15px; font-size: 0.9em; font-weight: 600;">
                            ${record.kondisi}
                        </span>
                    </td>
                    <td>${record.pakan.toFixed(1)}</td>
                    <td style="color: ${record.ayamMati > 0 ? '#ff6b6b' : '#28a745'}">
                        ${record.ayamMati}
                    </td>
                    <td>
                        <button class="delete-btn" onclick="hapusData(${record.id})">Hapus</button>
                    </td>
                `;
            });
        }

        // Warna kondisi telur
        function getKondisiColor(kondisi) {
            switch(kondisi) {
                case 'BAGUS': return '#28a745';
                case 'RETak': return '#ffc107';
                case 'KOTOR': return '#ff6b6b';
                default: return '#6c757d';
            }
        }

        // Hapus data
        function hapusData(id) {
            if (confirm('Yakin ingin menghapus data ini?')) {
                dataRecords = dataRecords.filter(record => record.id !== id);
                localStorage.setItem('ayamPetelurData', JSON.stringify(dataRecords));
                updateStats();
                renderTable();
            }
        }

        // Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                simpanData();
            }
        });
    </script>
</body>
</html>
